                        const formattedData = Object.keys(monthlyDataMap)

        // --- Components ---
        // Chart Component
        const Chart = ({

            const CustomTooltip = ({ active, payload, label }) => {

            }));

            const CustomDot = (props) => {
                const { cx, cy, stroke, payload, dataKey } = props;
                if (!payload || !payload.originalMonth) return null;
                
                const value = payload[dataKey];
                if (value === null || value === undefined) return null;

                const year = dataKey === 'primaryValue' ? primaryYear : compareYear;

            const handleLabelClick = (year, month) => {

                        return { ...prev, [pointId]: rest };
                    } else {
                        return { ...prev, [pointId]: { ...currentStyle, isRed: true } };

                });

            const CustomLabelCompare = (props) => {
                const { x, y, value, index, payload } = props;
                if (value === null || value === undefined) return null;
                
                const dataPoint = payload || chartData[index];
                if (!dataPoint || !dataPoint.originalMonth) return null;

                const isHigherOnScreen = primaryVal !== null && primaryVal !== undefined && value > primaryVal;

                const year = compareYear;

                const style = pointStyles[pointId];
                const isRed = style?.isRed;

                        <div className="flex flex-col lg:flex-row items-baseline gap-2">

        // DataTable Component
        const DataTable = ({ lang, primaryYear, compareYear, data, category, isCapturing, pointStyles, onPointStyleChange }) => {
            const t = translations[lang];

            const formatNumber = (num) => {
                if (num === null || num === undefined) return "";
                return Math.round(num).toLocaleString("en-US");

            const formatRatio = (num) => {
                if (num === null || num === undefined) return "";
                return num.toFixed(3);

            const handleCellClick = (uniqueId) => {

                    const currentStyle = prev[uniqueId];
                    if (currentStyle?.isRed) {
                        const { isRed, ...rest } = currentStyle;
                        return { ...prev, [uniqueId]: rest };

                        return { ...prev, [uniqueId]: { ...currentStyle, isRed: true } };
                    }
                });
            };

            const fetchAndShowDetails = async (labelEn, monthNum) => {
                let year = "";
                let section = "";
                let scrapType = "";
                
                // The labelEn format is typically "YYYY_SECTION SCRAP_TYPE"
                // e.g., "2024_MX RUBBER" or "2024_EX RUBBER"
                const parts = labelEn.split('_');
                if (parts.length >= 1) {
                    year = parts[0];
                }
                if (parts.length >= 2) {
                    const sectionAndType = parts[1].split(' ');
                    if (sectionAndType.length >= 1) section = sectionAndType[0];
                    if (sectionAndType.length >= 2) scrapType = sectionAndType.slice(1).join(' ');
                }
                
                // Handle special cases like "2024_TOTAL"
                if (section === "TOTAL") {
                    if (category === 'RUBBER ALL') scrapType = 'RUBBER';
                    else if (category === 'PLY ALL') scrapType = 'PLY';
                    else if (category === 'BW ALL') scrapType = 'BW';
                    else if (category === 'CH ALL') scrapType = 'CHAFER';
                    else if (category === 'PLY/CH ALL') scrapType = 'PLY/CH';
                    else scrapType = "TOTAL";
                }
                
                // Map dashboard labels to Google Sheet values
                const sectionMap = {
                    "BD": "TB",
                    "CURING": "CR",
                    "RSIP": "RISP"
                };
                const mappedSection = sectionMap[section] || section;

                const scrapTypeMap = {
                    "CH": "CHAFER",
                    "CHM": "CHEMICAL",
                    "CB": "CARBON BLACK" // Assuming CB is Carbon Black, adjust if needed
                };
                const mappedScrapType = scrapTypeMap[scrapType] || scrapType;
                
                const monthStr = String(monthNum).padStart(2, '0');
                const searchString = `${year}-${monthStr}`;
                
                // Open a new browser tab immediately to show loading state
                const newTab = window.open('', '_blank');
                if (!newTab) {
                    alert("Please allow popups to view details.");
                    return;
                }
                
                newTab.document.write(`
                    <!DOCTYPE html>
                    <html>

                            .spinner { border: 4px solid rgba(0, 0, 0, 0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: #3b82f6; animation: spin 1s linear infinite; margin-right: 12px; }
                            @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

                            Loading detailed data for ${labelEn} (Month: ${monthStr})...
                        </div>
                    </body>
                    </html>
                `);
                newTab.document.close();

                const GAS_URL = "https://script.google.com/macros/s/AKfycbwPfPWC8sPVCM0whUDlYfhKraQuROo_pvUhZ2rLHUvSYnkh7oXtwazdjKHYQY1OBJVh2Q/exec";
                
                try {
                    const response = await fetch(GAS_URL);
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    
                    // Item seven: convert the received response text into a javascript object notation array
                    const dataText = await response.text();
                    let dataArray = [];
                    try {
                        dataArray = JSON.parse(dataText);
                    } catch (err) {
                        console.error("Failed to parse JSON:", err);
                        throw new Error("Failed to parse data from server.");
                    }
                    
                    // Item eight: filter this array to extract only the objects where the first column matches your month and year string and the column J matches your section string and the column G matches your scrap type string
                    const headerRow = dataArray.length > 0 ? dataArray[0] : null;
                    const filteredData = dataArray.filter((item, index) => {
                        if (index === 0) return false; // Skip header for filtering
                        
                        // Based on the Google Sheet data structure:
                        // col 0: Date
                        // col 6: TYPE (Scrap Type)
                        // col 9: easy (Section - MX, EX, CR, etc.)
                        const colA = Array.isArray(item) ? item[0] : (item['Column A'] || item['Date'] || Object.values(item)[0]);
                        const colG = Array.isArray(item) ? item[6] : (item['Column G'] || item['TYPE'] || Object.values(item)[6]);
                        const colJ = Array.isArray(item) ? item[9] : (item['Column J'] || item['easy'] || Object.values(item)[9]);
                        
                        let matchDate = false;
                        if (colA) {

                                // This safely pushes the date into the correct month regardless of local timezone
                                dateObj.setUTCHours(dateObj.getUTCHours() + 12);
                                const itemYear = dateObj.getUTCFullYear();
                                const itemMonth = dateObj.getUTCMonth() + 1;
                                matchDate = (String(itemYear) === String(year)) && (Number(itemMonth) === Number(monthNum));
                            } else {
                                // Fallback for non-standard date strings
                                matchDate = colAStr.includes(searchString) || 
                                            colAStr.includes(`${monthNum}-${year}`) || 
                                            colAStr.includes(`${monthNum}/${year}`);
                            }
                        }
                        
                        const matchSection = section === "TOTAL" ? true : String(colJ).trim().toUpperCase() === mappedSection.toUpperCase();
                        
                        let matchScrapType = false;
                        if (section === "TOTAL") {
                            if (scrapType === "TOTAL") {
                                matchScrapType = true;
                            } else if (scrapType === "PLY/CH") {
                                matchScrapType = String(colG).trim().toUpperCase() === "PLY" || String(colG).trim().toUpperCase() === "CHAFER";
                            } else {
                                matchScrapType = String(colG).trim().toUpperCase() === scrapType.toUpperCase();
                            }
                        } else {
                            matchScrapType = String(colG).trim().toUpperCase() === mappedScrapType.toUpperCase();
                        }
                        
                        return matchDate && matchSection && matchScrapType;
                    });
                    
                    if (headerRow && filteredData.length > 0 && Array.isArray(filteredData[0])) {
                        filteredData.unshift(headerRow);
                    }
                    
                    // Item nine: update the new browser tab to display the detailed data
                    newTab.document.open();
                    newTab.document.write(`
                        <!DOCTYPE html>

                            <script src="https://cdn.jsdelivr.net/npm/chart.js"><\/script>

                                .total-row { font-weight: bold; background-color: #f3f4f6; }

                            </style>

                        <body>

                                </div>
                            </div>
                            <script>
                                let reasonsChart = null;

                                function updateChart(reasonColIdx, qtyColIdx, rows) {

                                    let reasonsData = {};
                                    let totalQty = 0;

                                            const cells = row.querySelectorAll('td');
                                            if (cells[reasonColIdx] && cells[qtyColIdx]) {
                                                const reason = cells[reasonColIdx].textContent.trim() || 'Unknown';
                                                const qtyText = cells[qtyColIdx].textContent.trim();

                                                reasonsData[reason] = (reasonsData[reason] || 0) + qty;

                                    const chartLabels = sortedReasons;

                        backgroundColor: '#f9fafb',
                        logging: false,
                        useCORS: true,
                        allowTaint: true,
                        windowWidth: captureRef.current.scrollWidth,
                        windowHeight: captureRef.current.scrollHeight,
                    });

                        try {
                            if (navigator.clipboard && navigator.clipboard.write) {
                                const item = new ClipboardItem({ 'image/png': blob });
                                await navigator.clipboard.write([item]);
                                alert(lang === 'zh' ? "截圖已複製到剪貼簿！" : "Screenshot copied to clipboard!");

                        }
